<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>DemoBank Online Banking (Demo Only)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="banner">
        <div class="brand">
          <span class="logo">DB</span>
          <div>
            <div class="bank-name">DemoBank</div>
            <div class="tagline">Secure Online Banking</div>
          </div>
        </div>
        <div class="demo-pill">Demo Only</div>
      </header>

      <main class="content">
        <div class="card">
          <div class="card-header">Sign in</div>
          <div class="card-body">
            <label for="user">Username</label>
            <input id="user" type="text" placeholder="Enter username" />

            <label for="pass">Password</label>
            <input id="pass" type="password" placeholder="Enter password" />

            <button class="primary" type="button">Login</button>

            <div class="helper">
              <a href="#">Forgot password?</a>
              <span class="dot">•</span>
              <a href="#">Enroll now</a>
            </div>
          </div>
          <div class="card-footer">
            This is a safe demo page for testing only. Do not enter real credentials.
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
